server.port=8080

spring.datasource.url=jdbc:h2:file:./data/mifinanza;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

# perfil por defecto (usa la config de seguridad de dev)
spring.profiles.active=dev

