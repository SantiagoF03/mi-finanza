services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    volumes:
      - db_data:/app
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_BASE=
        - VITE_API_KEY=${API_KEY:-}
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend

volumes:
  db_data:
  caddy_data:
  caddy_config:
